# CodeQL Advanced — Layer C (uploads to GitHub Code Scanning)
# Generated by GitHub Advanced setup, then tuned for this repo.
#
# Protect Main requires the check name **CodeQL (Layer C)** (python job below).
# Also analyzes Actions workflows + dashboard (JS/TS).

name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 19 * * 2"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: ${{ matrix.check_name }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep this exact name — Protect Main requires it.
          - language: python
            build-mode: none
            check_name: CodeQL (Layer C)
          - language: actions
            build-mode: none
            check_name: Analyze (actions)
          - language: javascript-typescript
            build-mode: none
            check_name: Analyze (javascript-typescript)

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Broader than default — matches prior Layer C gate.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
