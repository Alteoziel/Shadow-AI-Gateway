# CodeQL Advanced — Layer C (uploads to GitHub Code Scanning)
# Generated by GitHub Advanced setup, then tuned for this repo.
#
# Protect Main requires the check name **CodeQL (Layer C)** (python job below).
# Also analyzes Actions workflows + dashboard (JS/TS).

name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 19 * * 2"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: ${{ matrix.check_name }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Keep this exact name — Protect Main requires it.
          - language: python
            build-mode: none
            check_name: CodeQL (Layer C)
          - language: actions
            build-mode: none
            check_name: Analyze (actions)
          - language: javascript-typescript
            build-mode: none
            check_name: Analyze (javascript-typescript)

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      # Pre-download with curl retries. codeql-action/init streams the bundle and
      # does not retry on ECONNRESET / socket hang up (github/codeql-action#3367).
      # Keep CODEQL_BUNDLE_VERSION in sync with the pinned codeql-action defaults.
      - name: Download CodeQL bundle
        env:
          CODEQL_BUNDLE_VERSION: "2.26.1"
        run: |
          set -euo pipefail
          url="https://github.com/github/codeql-action/releases/download/codeql-bundle-v${CODEQL_BUNDLE_VERSION}/codeql-bundle-linux64.tar.zst"
          out="${RUNNER_TEMP}/codeql-bundle-linux64.tar.zst"
          for attempt in 1 2 3 4 5; do
            echo "Attempt ${attempt}: downloading CodeQL bundle ${CODEQL_BUNDLE_VERSION}..."
            if curl -fsSL \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 5 \
              --connect-timeout 30 \
              --max-time 900 \
              -o "${out}.partial" \
              "${url}"; then
              mv "${out}.partial" "${out}"
              ls -lh "${out}"
              echo "CODEQL_BUNDLE_PATH=${out}" >> "${GITHUB_ENV}"
              exit 0
            fi
            echo "Download failed on attempt ${attempt}; waiting before retry..."
            sleep $((attempt * 15))
          done
          echo "::error::Failed to download CodeQL bundle after retries"
          exit 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Broader than default — matches prior Layer C gate.
          queries: security-extended
          tools: ${{ env.CODEQL_BUNDLE_PATH }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
