name: Gateway CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Gateway pytest
    runs-on: ubuntu-latest

    env:
      GATEWAY_API_KEY: test-gateway-key

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.11.31/install.sh | sh

      - name: Install gateway (frozen)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen --extra dev

      - name: Run gateway tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run python -m pytest tests -q

  asyncio-debug-smoke:
    name: Gateway asyncio debug smoke
    runs-on: ubuntu-latest

    env:
      PYTHONASYNCIODEBUG: "1"
      GATEWAY_API_KEY: test-gateway-key

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/0.11.31/install.sh | sh

      - name: Install gateway (frozen)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen --extra dev

      - name: Run asyncio-debug smoke tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Subset smoke run — disable coverage floor (enforced by full Gateway pytest).
          uv run python -m pytest tests/test_health.py tests/test_security_layer.py -q --no-cov
