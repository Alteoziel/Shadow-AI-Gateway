name: Enterprise Hygiene (Layers B–E)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: enterprise-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  hygiene:
    name: Enterprise Layers B–E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install gateway (dev)
        run: |
          python -m pip install -U "pip>=25.3"
          pip install -e ".[dev]"

      # ── Layer B: secrets + dependency audit ─────────────────────────
      # Checksum-verified binary (no org Gitleaks Action license required).
      - name: "B · Gitleaks secret scan"
        env:
          GITLEAKS_VERSION: "8.24.3"
          GITLEAKS_SHA256: "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}" \
            -o "/tmp/${ARCHIVE}"
          echo "${GITLEAKS_SHA256}  /tmp/${ARCHIVE}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "/tmp/${ARCHIVE}" gitleaks
          gitleaks version
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --verbose \
            --redact \
            --exit-code 1

      - name: "B · pip-audit (gateway)"
        run: pip-audit --progress-spinner off

      - name: "B · pip-audit (governance)"
        working-directory: governance
        run: |
          python -m pip install -U "pip>=25.3"
          pip install -e ".[dev]"
          pip-audit --progress-spinner off

      - name: "B · npm audit (dashboard)"
        working-directory: dashboard
        run: |
          npm ci
          npm audit --audit-level=high

      # ── Layer C: lint, types, SAST ──────────────────────────────────
      - name: "C · Ruff"
        run: ruff check app tests

      - name: "C · Mypy"
        run: mypy app

      - name: "C · Semgrep"
        run: |
          set -euo pipefail
          # Isolated image avoids pip/setuptools conflicts with gateway deps.
          IMAGE="semgrep/semgrep:1.110.0"
          docker pull "$IMAGE"
          docker run --rm -v "$PWD:/src" -w /src "$IMAGE" \
            semgrep scan \
              --config .semgrep.yml \
              --error \
              --metrics off \
              app tests
          docker run --rm -v "$PWD:/src" -w /src "$IMAGE" \
            semgrep scan \
              --config p/python \
              --config p/owasp-top-ten \
              --severity=ERROR \
              --error \
              --metrics off \
              app tests

      # ── Layer D: product tests + coverage ───────────────────────────
      - name: "D · Pytest + coverage floor"
        run: pytest -q

      # ── Layer E: container + IaC ────────────────────────────────────
      - name: "E · Build gateway image"
        run: docker build -t shadow-ai-gateway:ci .

      - name: "E · Trivy image scan (CRITICAL+HIGH)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: shadow-ai-gateway:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: "E · Trivy SBOM (SPDX)"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: shadow-ai-gateway:ci
          format: spdx-json
          output: gateway-sbom.spdx.json
          exit-code: "0"

      - name: "E · Upload SBOM artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gateway-sbom
          path: gateway-sbom.spdx.json
          if-no-files-found: error

      - name: "E · Checkov (Terraform)"
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: infra/terraform
          framework: terraform
          soft_fail: false
          output_format: cli
          config_file: infra/terraform/.checkov.yml
