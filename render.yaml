services:
  - type: web
    name: shadow-ai-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GATEWAY_API_KEY
        sync: false
      - key: GATEWAY_API_KEYS
        sync: false
      - key: GATEWAY_RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: DEFAULT_PROVIDER
        value: openai
      - key: GATEWAY_HOST
        value: 0.0.0.0
      - key: GATEWAY_PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
